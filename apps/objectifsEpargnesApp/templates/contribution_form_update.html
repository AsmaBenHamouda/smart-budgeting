{% extends layout_path %}
{% load static %}
{% load i18n %}

{% block title %}Modifier contribution{% endblock %}

{% block content %}

<div class="col-xl mx-auto" style="max-width: 720px;">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0"><i class="bx bx-edit-alt"></i> Modifier contribution</h5>
      <small class="text-body">Objectif: {{ objectif.name }}</small>
    </div>

    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="mb-4">
          <label class="form-label" for="id_amount">Montant</label>
          <div class="input-group input-group-merge">
            <span class="input-group-text"><i class="bx bx-money"></i></span>
            {{ form.amount }}
            <span class="input-group-text">TND</span>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label" for="id_added_at">Date d’ajout</label>
          <div class="input-group input-group-merge">
            <span class="input-group-text"><i class="bx bx-calendar"></i></span>
            {{ form.added_at }}
          </div>
        </div>

        <div class="d-flex justify-content-between">
          <a href="{% url 'detailEpargne' objectif.pk %}" class="btn btn-secondary">Annuler</a>
          <button type="submit" class="btn btn-primary">
            <i class="bx bx-save"></i> Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
